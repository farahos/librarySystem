name: dhaxalbook_mobile
description: Flutter mobile client for the library system backend.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  file_picker: ^8.1.2
  carousel_slider: ^5.0.0
  url_launcher: ^6.3.1
  intl: ^0.19.0
  audioplayers: ^6.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
